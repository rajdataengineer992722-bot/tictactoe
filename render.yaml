services:
  - type: web
    name: tictac-nakama
    runtime: docker
    plan: free
    rootDir: .
    dockerfilePath: ./nakama/Dockerfile
    dockerContext: ./nakama
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: tictac-postgres
          property: connectionString
      - key: NAKAMA_SERVER_KEY
        generateValue: true
      - key: NAKAMA_SESSION_ENCRYPTION_KEY
        generateValue: true
      - key: NAKAMA_SESSION_REFRESH_ENCRYPTION_KEY
        generateValue: true
      - key: NAKAMA_RUNTIME_HTTP_KEY
        generateValue: true

databases:
  - name: tictac-postgres
    plan: free
    databaseName: nakama
    user: nakama
