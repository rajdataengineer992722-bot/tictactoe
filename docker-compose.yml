services:
  postgres:
    image: postgres:15-alpine
    container_name: tictac-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
      POSTGRES_USER: nakama
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama -d nakama"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - nakama-postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nakama:
    build:
      context: ./nakama
    container_name: tictac-nakama
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ecx
      - >
        /nakama/nakama migrate up --database.address postgres:nakama:localdb@postgres:5432/nakama &&
        exec /nakama/nakama --config /nakama/data/local.yml --database.address postgres:nakama:localdb@postgres:5432/nakama
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"

volumes:
  nakama-postgres:
